<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Interaktif HAKI - SMK Informatika</title>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            user-select: none;
            overflow: hidden; /* Mencegah layar tergeser saat main */
        }
        h1 { color: #00f2fe; font-size: 3em; margin-bottom: 5px; text-transform: uppercase;}
        p { font-size: 1.2em; color: #a8b2d1; margin-bottom: 20px; }

        /* Tombol Mulai (Wajib ada karena browser memblokir audio otomatis) */
        #layar-mulai {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(30, 30, 47, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        #btn-mulai {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: white;
            border: none;
            padding: 25px 50px;
            font-size: 2.5em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.5);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Area Tempat Kartu Awal */
        .kartu-container {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;
            flex-wrap: wrap; padding: 20px; background-color: #252538;
            border-radius: 20px; box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            min-height: 80px;
        }

        /* Desain Kartu */
        .kartu {
            padding: 15px 25px; border-radius: 15px; font-size: 1.5em; font-weight: bold;
            cursor: grab; box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            border: 4px solid transparent; transition: transform 0.2s;
        }
        .kartu:active { cursor: grabbing; transform: scale(1.1); }
        .c1 { background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); color: white; }
        .c2 { background: linear-gradient(135deg, #f9d423 0%, #ff4e50 100%); color: white; }
        .c3 { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: #1e1e2f; }
        .c4 { background: linear-gradient(135deg, #b224ef 0%, #7579ff 100%); color: white; }

        /* Area Kotak Kategori */
        .kategori-container { display: flex; justify-content: space-around; gap: 15px; }
        .kotak-kategori {
            width: 23%; min-height: 250px; background-color: #2a2a40;
            border: 4px dashed #64ffda; border-radius: 20px; padding: 15px;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .kotak-kategori.drag-over { background-color: #3d3d5c; border-color: #00f2fe; }
        .kotak-kategori h2 { color: #64ffda; font-size: 1.8em; margin-top: 0; border-bottom: 2px solid #64ffda; padding-bottom: 10px; width: 100%; }

        #pesan-hasil { font-size: 2.5em; font-weight: bold; margin-top: 30px; height: 50px; }

        /* Animasi Benar/Salah */
        .benar { border-color: #43e97b !important; box-shadow: 0 0 25px #43e97b !important; }
        .salah { border-color: #ff4e50 !important; box-shadow: 0 0 25px #ff4e50 !important; animation: getar 0.4s; }
        @keyframes getar {
            0%, 100% { transform: translateX(0); }
            25%, 75% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div id="layar-mulai">
        <button id="btn-mulai" onclick="mulaiGame()">MULAI GAME HAKI</button>
        <p style="margin-top: 20px; font-size: 1.5em; color: white;">Pastikan volume TV sudah menyala!</p>
    </div>

    <script>
        // Membuat suara TING (Benar) dan TETOT (Salah) menggunakan AudioContext bawaan browser
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function mainkanSuara(tipe) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if(tipe === 'benar') {
                // Suara TING! (Koin Super Mario vibe)
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(987.77, audioCtx.currentTime); // Note B5
                oscillator.frequency.exponentialRampToValueAtTime(1318.51, audioCtx.currentTime + 0.1); // Note E6
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.5);
            } else if(tipe === 'salah') {
                // Suara TETOT! (Buzzer)
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            } else if(tipe === 'menang') {
                // Suara Fanfare Menang
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(440, audioCtx.currentTime); // A4
                oscillator.frequency.setValueAtTime(554.37, audioCtx.currentTime + 0.1); // C#5
                oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.2); // E5
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime + 0.3); // A5
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 1);
            }
        }

        function mulaiGame() {
            // Hilangkan layar mulai
            document.getElementById('layar-mulai').style.display = 'none';
            // Inisialisasi audio agar browser mengizinkan suara keluar
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            // CATATAN UNTUK PAK DWI:
            // Jika Bapak punya file MP3 musik latar, Bapak bisa hilangkan tanda "//" di bawah ini:
            // let bgMusic = new Audio('musik-latar.mp3');
            // bgMusic.loop = true;
            // bgMusic.volume = 0.3;
            // bgMusic.play();
        }
    </script>

    <h1>Uji Konsentrasi: Kasus HAKI</h1>
    <p>Sentuh dan geser kartu kasus ke kotak kategori HAKI yang tepat!</p>

    <div class="kartu-container" id="sumber">
        <div class="kartu c1" draggable="true" id="k1">Source Code Aplikasi</div>
        <div class="kartu c2" draggable="true" id="k2">Logo Produksi Film</div>
        <div class="kartu c3" draggable="true" id="k3">Algoritma AI Baru</div>
        <div class="kartu c4" draggable="true" id="k4">Desain UI/UX Web</div>
    </div>

    <div class="kategori-container">
        <div class="kotak-kategori" id="hak-cipta"><h2>Hak Cipta</h2></div>
        <div class="kotak-kategori" id="merek"><h2>Merek</h2></div>
        <div class="kotak-kategori" id="paten"><h2>Paten</h2></div>
        <div class="kotak-kategori" id="desain"><h2>Desain Industri</h2></div>
    </div>

    <div id="pesan-hasil"></div>

    <script>
        const kartus = document.querySelectorAll('.kartu');
        const kotaks = document.querySelectorAll('.kotak-kategori');
        const sumber = document.getElementById('sumber');
        const pesan = document.getElementById('pesan-hasil');

        const kunciJawaban = {
            'k1': 'hak-cipta', 'k2': 'merek', 'k3': 'paten', 'k4': 'desain'
        };

        kartus.forEach(kartu => {
            kartu.addEventListener('dragstart', () => { kartu.classList.add('dragging'); });
            kartu.addEventListener('dragend', () => { kartu.classList.remove('dragging'); });
        });

        kotaks.forEach(kotak => setDropZone(kotak));
        setDropZone(sumber);

        function setDropZone(zona) {
            zona.addEventListener('dragover', e => {
                e.preventDefault();
                zona.classList.add('drag-over');
            });
            zona.addEventListener('dragleave', () => { zona.classList.remove('drag-over'); });
            zona.addEventListener('drop', e => {
                e.preventDefault();
                zona.classList.remove('drag-over');
                const draggedElement = document.querySelector('.dragging');
                
                if (draggedElement) {
                    zona.appendChild(draggedElement);
                    
                    if (zona.id !== 'sumber') {
                        if (zona.id === kunciJawaban[draggedElement.id]) {
                            draggedElement.classList.add('benar');
                            draggedElement.classList.remove('salah');
                            mainkanSuara('benar'); // Panggil suara TING!
                        } else {
                            draggedElement.classList.add('salah');
                            draggedElement.classList.remove('benar');
                            mainkanSuara('salah'); // Panggil suara TETOT!
                        }
                    } else {
                        draggedElement.classList.remove('benar', 'salah');
                    }
                    cekSemuaSelesai();
                }
            });
        }

        function cekSemuaSelesai() {
            let skorBenar = document.querySelectorAll('.benar').length;
            let totalTerjawab = document.querySelectorAll('.kategori-container .kartu').length;

            if (totalTerjawab === 4 && skorBenar === 4) {
                pesan.style.color = "#43e97b";
                pesan.innerHTML = "🎉 LUAR BIASA! Semua Jawaban Benar! 🎉";
                setTimeout(() => mainkanSuara('menang'), 500); // Suara terompet menang!
            } else if (totalTerjawab === 4) {
                pesan.style.color = "#ff758c";
                pesan.innerHTML = "🔥 Masih ada yang salah. Ayo perbaiki! 🔥";
            } else {
                pesan.innerHTML = ""; 
            }
        }
    </script>
</body>
</html>
