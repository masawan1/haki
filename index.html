<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Interaktif HAKI - SMK Informatika</title>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            user-select: none;
            overflow: hidden;
        }
        h1 { color: #00f2fe; font-size: 3em; margin-bottom: 5px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,242,254,0.5);}
        #judul-kota { font-size: 1.5em; color: #f9d423; margin-bottom: 20px; font-weight: bold; }

        /* Layar Menu Utama */
        #layar-mulai {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(30, 30, 47, 0.98);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 999;
        }
        .judul-menu { font-size: 4em; color: #64ffda; margin-bottom: 40px; text-transform: uppercase; text-shadow: 0 0 20px rgba(100,255,218,0.5);}
        
        .menu-container { display: flex; gap: 40px; }
        
        .btn-kota {
            background: #2a2a40; border: 4px solid; color: white;
            padding: 40px 60px; font-size: 2em; font-weight: bold;
            border-radius: 30px; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .btn-kota:hover { transform: scale(1.05); }
        .btn-kota span { font-size: 0.5em; color: #a8b2d1; font-weight: normal;}
        
        #btn-kota-a { border-color: #00f2fe; box-shadow: 0 10px 30px rgba(0, 242, 254, 0.3); }
        #btn-kota-b { border-color: #ff758c; box-shadow: 0 10px 30px rgba(255, 117, 140, 0.3); }

        /* Area Game */
        #area-game { display: none; }

        .kartu-container {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;
            flex-wrap: wrap; padding: 20px; background-color: #252538;
            border-radius: 20px; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); min-height: 80px;
        }

        .kartu {
            padding: 15px 25px; border-radius: 15px; font-size: 1.4em; font-weight: bold;
            cursor: grab; box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            border: 4px solid transparent; transition: transform 0.2s;
        }
        .kartu:active { cursor: grabbing; transform: scale(1.1); }
        .c1 { background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); color: white; }
        .c2 { background: linear-gradient(135deg, #f9d423 0%, #ff4e50 100%); color: white; }
        .c3 { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: #1e1e2f; }
        .c4 { background: linear-gradient(135deg, #b224ef 0%, #7579ff 100%); color: white; }

        .kategori-container { display: flex; justify-content: space-around; gap: 15px; }
        .kotak-kategori {
            width: 23%; min-height: 250px; background-color: #2a2a40;
            border: 4px dashed #64ffda; border-radius: 20px; padding: 15px;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .kotak-kategori.drag-over { background-color: #3d3d5c; border-color: #00f2fe; }
        .kotak-kategori h2 { color: #64ffda; font-size: 1.8em; margin-top: 0; border-bottom: 2px solid #64ffda; padding-bottom: 10px; width: 100%; }

        #pesan-hasil { font-size: 2.5em; font-weight: bold; margin-top: 20px; height: 50px; }
        
        #btn-kembali {
            margin-top: 15px; background: #3d3d5c; color: white; border: none;
            padding: 10px 30px; font-size: 1.2em; border-radius: 10px; cursor: pointer;
            display: none; 
        }

        .benar { border-color: #43e97b !important; box-shadow: 0 0 25px #43e97b !important; }
        .salah { border-color: #ff4e50 !important; box-shadow: 0 0 25px #ff4e50 !important; animation: getar 0.4s; }
        @keyframes getar {
            0%, 100% { transform: translateX(0); }
            25%, 75% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div id="layar-mulai">
        <div class="judul-menu">PILIH MISI KASUS HAKI</div>
        <div class="menu-container">
            <button class="btn-kota" id="btn-kota-a" onclick="mulaiGame('A')">
                KOTA A <span>(Kasus IT & Programmer)</span>
            </button>
            <button class="btn-kota" id="btn-kota-b" onclick="mulaiGame('B')">
                KOTA B <span>(Kasus Film & Broadcasting)</span>
            </button>
        </div>
    </div>

    <script>
        // Musik Latar Streaming Online (Otomatis tanpa file MP3 lokal)
        let bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'); 
        bgMusic.loop = true;
        bgMusic.volume = 0.15; // Volume rendah agar suara guru tetap jelas

        // Sound Effect Otomatis
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function mainkanSuara(tipe) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            
            if(tipe === 'benar') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(987.77, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1318.51, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else if(tipe === 'salah') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if(tipe === 'menang') {
                osc.type = 'square'; osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.setValueAtTime(554.37, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.2);
                osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
                osc.start(); osc.stop(audioCtx.currentTime + 1);
            }
        }
    </script>

    <div id="area-game">
        <h1>Uji Konsentrasi HAKI</h1>
        <div id="judul-kota">Sedang Mengerjakan: MISI KOTA ...</div>
        
        <div class="kartu-container" id="sumber">
            <div class="kartu c1" draggable="true" id="k1">Kartu 1</div>
            <div class="kartu c2" draggable="true" id="k2">Kartu 2</div>
            <div class="kartu c3" draggable="true" id="k3">Kartu 3</div>
            <div class="kartu c4" draggable="true" id="k4">Kartu 4</div>
        </div>

        <div class="kategori-container">
            <div class="kotak-kategori" id="hak-cipta"><h2>Hak Cipta</h2></div>
            <div class="kotak-kategori" id="merek"><h2>Merek</h2></div>
            <div class="kotak-kategori" id="paten"><h2>Paten</h2></div>
            <div class="kotak-kategori" id="desain"><h2>Desain Industri</h2></div>
        </div>

        <div id="pesan-hasil"></div>
        <button id="btn-kembali" onclick="kembaliKeMenu()">⬅ Kembali ke Menu Utama</button>
    </div>

    <script>
        const bankSoal = {
            'A': {
                nama: "MISI KOTA A (Kasus Anak IT & Programmer)",
                k1: { teks: "Source Code Aplikasi Android", jawaban: "hak-cipta" },
                k2: { teks: "Logo Startup Software House", jawaban: "merek" },
                k3: { teks: "Algoritma AI Baru & Rahasia", jawaban: "paten" },
                k4: { teks: "Desain Antarmuka (UI) Aplikasi", jawaban: "desain" }
            },
            'B': {
                nama: "MISI KOTA B (Kasus Anak Film & Kreator)",
                k1: { teks: "Naskah Skenario Film Pendek", jawaban: "hak-cipta" },
                k2: { teks: "Nama Production House (PH)", jawaban: "merek" },
                k3: { teks: "Modifikasi Alat Penstabil Kamera", jawaban: "paten" },
                k4: { teks: "Bentuk Fisik Kamera Mirrorless", jawaban: "desain" }
            }
        };

        let kunciJawabanAktif = {};

        function mulaiGame(pilihanKota) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            // MUSIK AKAN JALAN DISINI SAAT TOMBOL DITEKAN
            bgMusic.play().catch(e => console.log("Menunggu interaksi pengguna untuk audio"));

            document.getElementById('layar-mulai').style.display = 'none';
            document.getElementById('area-game').style.display = 'block';
            document.getElementById('btn-kembali').style.display = 'none';
            document.getElementById('pesan-hasil').innerHTML = '';
            document.getElementById('judul-kota').innerText = "Sedang Mengerjakan: " + bankSoal[pilihanKota].nama;

            const sumber = document.getElementById('sumber');
            for(let i=1; i<=4; i++) {
                let idKartu = 'k' + i;
                let elemenKartu = document.getElementById(idKartu);
                elemenKartu.innerText = bankSoal[pilihanKota][idKartu].teks;
                kunciJawabanAktif[idKartu] = bankSoal[pilihanKota][idKartu].jawaban;
                elemenKartu.classList.remove('benar', 'salah');
                sumber.appendChild(elemenKartu);
            }
        }

        function kembaliKeMenu() {
            document.getElementById('layar-mulai').style.display = 'flex';
            document.getElementById('area-game').style.display = 'none';
            // Opsional: Matikan musik saat kembali ke menu dengan menghapus tanda "//" di bawah
            // bgMusic.pause();
        }

        const kartus = document.querySelectorAll('.kartu');
        const kotaks = document.querySelectorAll('.kotak-kategori');
        const sumber = document.getElementById('sumber');
        const pesan = document.getElementById('pesan-hasil');

        kartus.forEach(kartu => {
            kartu.addEventListener('dragstart', () => { kartu.classList.add('dragging'); });
            kartu.addEventListener('dragend', () => { kartu.classList.remove('dragging'); });
        });

        kotaks.forEach(kotak => setDropZone(kotak));
        setDropZone(sumber);

        function setDropZone(zona) {
            zona.addEventListener('dragover', e => { e.preventDefault(); zona.classList.add('drag-over'); });
            zona.addEventListener('dragleave', () => { zona.classList.remove('drag-over'); });
            zona.addEventListener('drop', e => {
                e.preventDefault();
                zona.classList.remove('drag-over');
                const draggedElement = document.querySelector('.dragging');
                
                if (draggedElement) {
                    zona.appendChild(draggedElement);
                    if (zona.id !== 'sumber') {
                        if (zona.id === kunciJawabanAktif[draggedElement.id]) {
                            draggedElement.classList.add('benar');
                            draggedElement.classList.remove('salah');
                            mainkanSuara('benar');
                        } else {
                            draggedElement.classList.add('salah');
                            draggedElement.classList.remove('benar');
                            mainkanSuara('salah');
                        }
                    } else {
                        draggedElement.classList.remove('benar', 'salah');
                    }
                    cekSemuaSelesai();
                }
            });
        }

        function cekSemuaSelesai() {
            let skorBenar = document.querySelectorAll('.benar').length;
            let totalTerjawab = document.querySelectorAll('.kategori-container .kartu').length;

            if (totalTerjawab === 4 && skorBenar === 4) {
                pesan.style.color = "#43e97b";
                pesan.innerHTML = "🎉 MISI SELESAI! Kalian Luar Biasa! 🎉";
                setTimeout(() => mainkanSuara('menang'), 500);
                document.getElementById('btn-kembali').style.display = 'inline-block';
            } else if (totalTerjawab === 4) {
                pesan.style.color = "#ff758c";
                pesan.innerHTML = "🔥 Masih ada yang salah. Ayo perbaiki! 🔥";
                document.getElementById('btn-kembali').style.display = 'none';
            } else {
                pesan.innerHTML = ""; 
                document.getElementById('btn-kembali').style.display = 'none';
            }
        }
    </script>
</body>
</html>
